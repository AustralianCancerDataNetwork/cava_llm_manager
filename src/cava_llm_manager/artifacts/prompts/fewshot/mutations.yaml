name: genomic_mutation_extraction
version: v2

description: >
  Few-shot examples for extracting genomic mutation test results from oncology
  reports as true batches.

examples:

  - inputs:
      - EGFR exon 19 deletion detected.
      - No EGFR/BRAF/KRAS mutations and ALK/ROS1 IHC negative.
      - Send off ALK, EGFR and ROS1.
      - BRAF V600E mutation detected.
      - ALK rearrangement negative.
      - EGFR mutation detected, ALK and ROS1 negative.

    output:
      reports:
        - report_id: 1
          tests:
            - genomic_marker: EGFR
              test_result: positive
              variant: exon 19 deletion

        - report_id: 2
          tests:
            - genomic_marker: EGFR
              test_result: negative
              variant: null
            - genomic_marker: BRAF
              test_result: negative
              variant: null
            - genomic_marker: KRAS
              test_result: negative
              variant: null
            - genomic_marker: ALK
              test_result: negative
              variant: null
            - genomic_marker: ROS1
              test_result: negative
              variant: null

        - report_id: 3
          tests:
            - genomic_marker: ALK
              test_result: result_pending
              variant: null
            - genomic_marker: EGFR
              test_result: result_pending
              variant: null
            - genomic_marker: ROS1
              test_result: result_pending
              variant: null

        - report_id: 4
          tests:
            - genomic_marker: BRAF
              test_result: positive
              variant: V600E

        - report_id: 5
          tests:
            - genomic_marker: ALK
              test_result: negative
              variant: null

        - report_id: 6
          tests:
            - genomic_marker: EGFR
              test_result: positive
              variant: null
            - genomic_marker: ALK
              test_result: negative
              variant: null
            - genomic_marker: ROS1
              test_result: negative
              variant: null
