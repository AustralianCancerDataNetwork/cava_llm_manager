name: genomic_extraction
version: v2

description: >
  Few-shot examples for extracting genomic test results from oncology reports,
  including PD-L1 expression categorisation.

examples:

  - input: |
      EGFR exon 19 deletion detected.

    output:
      reports:
        - report_id: 1
          tests:
            - genomic_marker: EGFR
              test_result: positive
              variant: exon 19 deletion
              pdl1_expression: null

  - input: |
      No EGFR/BRAF/KRAS mutations and ALK/ROS1 IHC negative.

    output:
      reports:
        - report_id: 2
          tests:
            - genomic_marker: EGFR
              test_result: negative
              pdl1_expression: null
            - genomic_marker: BRAF
              test_result: negative
              pdl1_expression: null
            - genomic_marker: KRAS
              test_result: negative
              pdl1_expression: null
            - genomic_marker: ALK
              test_result: negative
              pdl1_expression: null
            - genomic_marker: ROS1
              test_result: negative
              pdl1_expression: null

  - input: |
      PDL1: unsatisfactory results.

    output:
      reports:
        - report_id: 3
          tests:
            - genomic_marker: PDL1
              test_result: unknown
              pdl1_expression: unknown

  - input: |
      Send off ALK, EGFR, and ROS1.

    output:
      reports:
        - report_id: 4
          tests:
            - genomic_marker: ALK
              test_result: result_pending
              pdl1_expression: null
            - genomic_marker: EGFR
              test_result: result_pending
              pdl1_expression: null
            - genomic_marker: ROS1
              test_result: result_pending
              pdl1_expression: null

  - input: |
      EGFR mutation, ALK and ROS1 gene rearrangement -ve, PD-L1 (60%)

    output:
      reports:
        - report_id: 5
          tests:
            - genomic_marker: EGFR
              test_result: positive
              pdl1_expression: null
            - genomic_marker: ALK
              test_result: negative
              pdl1_expression: null
            - genomic_marker: ROS1
              test_result: negative
              pdl1_expression: null
            - genomic_marker: PDL1
              test_result: positive
              pdl1_expression: high

  - input: |
      PD-L1 tumour proportion score 20%.

    output:
      reports:
        - report_id: 6
          tests:
            - genomic_marker: PDL1
              test_result: positive
              pdl1_expression: low

  - input: |
      PD-L1 expression 0%.

    output:
      reports:
        - report_id: 7
          tests:
            - genomic_marker: PDL1
              test_result: negative
              pdl1_expression: negative