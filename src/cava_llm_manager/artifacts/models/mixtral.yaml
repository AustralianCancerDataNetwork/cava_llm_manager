description: >
  Instruction-tuned sparse Mixture-of-Experts (MoE) language model from the Mixtral
  suite. Built using 8 experts of ~7B parameters each with top-2 routing, resulting
  in ~12–14B active parameters per token. This Q4_K_M GGUF variant provides a strong
  balance between performance and memory efficiency, enabling high-quality reasoning
  comparable to larger dense models while remaining suitable for local inference
  with partial GPU offloading.

