description: >
  Reasoning-distilled variant of Qwen3.5-27B, fine-tuned to replicate the structured
  reasoning style of Claude 4.6 Opus via supervised distillation of chain-of-thought
  trajectories. This model emphasises step-by-step problem solving, planning, and
  agentic execution, with native support for thinking-mode reasoning and improved
  stability in tool-calling and coding workflows.

  The GGUF Q4_K_M variant provides an efficient balance between performance and
  memory usage (~16–18GB VRAM), enabling strong reasoning capability comparable to
  larger models while remaining suitable for local inference on mid-range hardware.

